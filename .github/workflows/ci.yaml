name: CI Pipeline

on:
  push:

jobs:
  project-testing:
    runs-on: ubuntu-latest

    steps:
      # Checkout Repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Cache pip
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Check DagsHub Secret
      - name: Check DagsHub Secret
        env:
          CAPSTONE_TEST: ${{ secrets.CAPSTONE_TEST }}
        run: |
          if [ -z "$CAPSTONE_TEST" ]; then
            echo "❌ CAPSTONE_TEST Secret Missing"
            exit 1
          fi

          echo "✅ CAPSTONE_TEST Secret Found"

      # Run DVC Pipeline
      - name: Run Pipeline
        env:
          CAPSTONE_TEST: ${{ secrets.CAPSTONE_TEST }}
        run: |
          dvc repro

      # Run Model Tests
      - name: Run Model Tests
        env:
          CAPSTONE_TEST: ${{ secrets.CAPSTONE_TEST }}
        run: |
          python -m unittest tests/test_model.py

      # Promote Model
      - name: Promote Model
        if: success()
        env:
          CAPSTONE_TEST: ${{ secrets.CAPSTONE_TEST }}
        run: |
          python scripts/promote_model.py

      # Flask Tests
      - name: Run Flask App Tests
        if: success()
        env:
          CAPSTONE_TEST: ${{ secrets.CAPSTONE_TEST }}
        run: |
          python -m unittest tests/test_flask_app.py

      # Configure AWS Credentials
      - name: Configure AWS Credentials
        if: success()
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Login to Amazon ECR
      - name: Login to Amazon ECR
        if: success()
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build Docker Image
      - name: Build Docker Image
        if: success()
        run: |
          docker build -t ${{ secrets.ECR_REPOSITORY }}:latest .

      # Tag Docker Image
      - name: Tag Docker Image
        if: success()
        run: |
          docker tag \
          ${{ secrets.ECR_REPOSITORY }}:latest \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest

      # Push Docker Image
      - name: Push Docker Image
        if: success()
        run: |
          docker push \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest

      # Setup kubectl
      - name: Setup kubectl
        if: success()
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      # Configure kubeconfig
      - name: Update kubeconfig
        if: success()
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name flask-app-cluster

      # Create Kubernetes Secret
      - name: Create Kubernetes Secret
        if: success()
        run: |
          kubectl create secret generic capstone-secret \
            --from-literal=CAPSTONE_TEST="${{ secrets.CAPSTONE_TEST }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      # Deploy to EKS
      - name: Deploy to EKS
        if: success()
        run: |
          kubectl apply -f deployment.yaml